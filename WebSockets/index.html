<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>WebSocket Server Demo</h1>
    
    <script>
        //Grab the complete host (domain + port)
        const { host } = window.location;

        //Establish the connection using the dynamic host:
        const connection = new WebSocket(`ws://${host}`); 

        //Connection to send ping message:
        connection.onopen = () => {
            console.log('Handshake successful! Sending ping...');
            connection.send('ping from the client......');
        };

        //Add '.data' to log the actual string message:
        connection.onmessage = (event) => {
            console.log('Received from server:', event.data);
        };
    </script>
  </body>
</html>
